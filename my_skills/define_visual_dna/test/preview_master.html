<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Visual DNA Preview</title>
    <!-- Import the Theme Variables -->
    <link rel="stylesheet" href="../resources/ref_theme_tech.css">
    <style>
        /* This simulates how the Layout Architect would inject styles into the Slide Container */
        body {
            margin: 0;
            background: #333;
            /* Contrast bg for preview */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>

<body>
    <!-- The Slide Container -->
    <div class="slide">
        <!-- Import the Master HTML structure -->
        <!-- In a real agent workflow, this content would be injected dynamically -->

        <!-- BEGIN ref_master_tech.html CONTENT -->
        <div class="slide-master">
            <div class="crt-overlay"
                style="position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, transparent 0%, #000 120%); pointer-events: none; z-index: 1;">
            </div>

            <div class="tech-grid" style="
                position: absolute; 
                top: 0; left: 0; width: 100%; height: 100%; 
                background-image: linear-gradient(#1a1a1a 1px, transparent 1px), linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
                background-size: 50px 50px;
                opacity: 0.2;
            "></div>

            <div class="footer-bar" style="
                position: absolute; 
                bottom: 40px; 
                left: 40px; 
                right: 40px; 
                height: 2px; 
                background: var(--ppt-text-accent);
                opacity: 0.5;
            "></div>

            <div class="logo-area" style="position: absolute; bottom: 50px; right: 50px;">
                <span style="font-family: var(--ppt-font-family-code); letter-spacing: 2px;">PPT-FACTORY</span>
            </div>

            <div class="slide-num" data-pptx-placeholder="slide_number" style="
                position: absolute; 
                bottom: 50px; 
                left: 50px; 
                font-family: var(--ppt-font-family-code); 
                color: var(--ppt-text-muted);
            ">
                01
            </div>
        </div>
        <!-- END ref_master_tech.html CONTENT -->

        <!-- Sample Content to Verify Fonts -->
        <div style="position: absolute; top: 200px; left: 100px;">
            <h1 style="font-size: var(--ppt-fs-title); margin: 0;">VISUAL DNA VERIFIED</h1>
            <h2 style="font-size: var(--ppt-fs-subtitle); color: var(--ppt-text-accent); margin-top: 20px;">System
                Status: Operational</h2>
            <p style="font-size: var(--ppt-fs-body); color: var(--ppt-text-muted); max-width: 600px; margin-top: 40px;">
                The design system successfully maps CSS variables to visual output.
                This text should render in Inter, while the footer uses Monospace.
            </p>
        </div>
    </div>
</body>

</html>
