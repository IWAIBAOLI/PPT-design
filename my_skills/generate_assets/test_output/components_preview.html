<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PPT Component Arsenal Preview</title>
    <style>
        :root {
            --sidebar-width: 280px;
            --header-height: 60px;
            --bg-neutral: #f4f6f8;
            --bg-white: #ffffff;
            --border-color: #e1e4e8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-neutral);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: var(--sidebar-width);
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.02);
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
        }

        h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #888;
            margin-top: 20px;
            letter-spacing: 0.05em;
        }

        .nav-item {
            display: block;
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 6px;
            color: #444;
            text-decoration: none;
            transition: background 0.2s;
            font-size: 0.9rem;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: #f0f0f0;
        }

        .nav-item.active {
            background: #e6f7ff;
            color: #007aff;
            border-left-color: #007aff;
        }

        /* Main Viewport */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-image:
                radial-gradient(#ddd 1px, transparent 1px);
            background-position: 0 0;
            background-size: 20px 20px;
        }

        /* Slide Simulation Canvas */
        .slide-canvas {
            width: 1280px;
            height: 720px;
            /* Fit to screen */
            transform: scale(0.8);
            transform-origin: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;

            /* Theme Variables Application */
            background: var(--ppt-bg-gradient-main, #ffffff);
            font-family: var(--ppt-font-family, sans-serif);
            color: var(--ppt-color-text-main, #000);
        }

        /* Component Grid within Canvas */
        .component-grid {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .section-header {
            grid-column: 1 / -1;
            margin-top: 40px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 1.5rem;
            opacity: 0.6;
        }

        /* Component Wrapper for Preview */
        .component-wrapper {
            position: relative;
            min-height: 100px;
            /* Dashed border only visible in preview, strictly valid HTML inside */
        }

        .component-wrapper:hover::after {
            content: attr(data-name);
            position: absolute;
            top: -25px;
            left: 0;
            background: #333;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
    </style>
    <link rel="stylesheet" href="theme.css">
    <script>
        function filterCategory(category) {
            document.querySelectorAll('.component-category').forEach(el => {
                if (category === 'all' || el.dataset.category === category) {
                    el.style.display = 'contents';
                } else {
                    el.style.display = 'none';
                }
            });
            // Update Active State
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</head>

<body>

    <aside>
        <h1>PPT Arsenal</h1>
        <a href="#" class="nav-item active" onclick="filterCategory('all')">All Components</a>

        <h2>Structure</h2>
        <a href="#" class="nav-item" onclick="filterCategory('Structure')">Navigation</a>
        <a href="#" class="nav-item" onclick="filterCategory('Hierarchy')">Typography</a>

        <h2>Containers</h2>
        <a href="#" class="nav-item" onclick="filterCategory('Cards')">Content Cards</a>

        <h2>Logic</h2>
        <a href="#" class="nav-item" onclick="filterCategory('Logic')">Diagrams</a>

        <h2>Evidence</h2>
        <a href="#" class="nav-item" onclick="filterCategory('Data')">Charts & Data</a>
    </aside>

    <main>
        <div class="slide-canvas">
            <div class="component-grid">
                <!-- INJECTED GENERATED COMPONENTS -->
                
        <section class="component-category" data-category="Structure">
            <h3>1.1 Mock Navigation</h3>
            <div class="component-wrapper" data-name="MockBreadcrumb">
                <div class="ppt-text-secondary">Home / Mock / Page</div>
            </div>
        </section>
        <section class="component-category" data-category="Decorators">
             <h3>5.2 Mock Decorators</h3>
             <!-- Should detect .ppt-decor-1 from theme -->
             <div class="component-wrapper" data-name="Decor-1">
                 <div class="ppt-decor-1"></div>
             </div>
        </section>
        
            </div>
        </div>
    </main>

</body>

</html>
