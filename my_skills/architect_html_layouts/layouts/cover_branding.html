<div class="layout-cover" style="
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
    z-index: 10;
    position: relative;
">
    <h1 data-pptx-placeholder="title"
        style="font-family: var(--ppt-font-heading); font-size: var(--ppt-size-h1); color: var(--ppt-color-text-primary); margin-bottom: 20px;">
        {{ title }}
    </h1>
    <p data-pptx-placeholder="subtitle"
        style="font-family: var(--ppt-font-body); font-size: var(--ppt-size-h2); color: var(--ppt-color-text-secondary);">
        {{ subtitle }}
    </p>
</div>
