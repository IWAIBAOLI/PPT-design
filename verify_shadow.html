<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify Shadow Parsing</title>
    <style>
        body {
            width: 1280px;
            height: 720px;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            display: flex;
            gap: 50px;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 300px;
            height: 200px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 24px;
        }

        /* 
           Case 1: Multi-layer shadow. 
           Layer 1: small (0 4px 6px)
           Layer 2: large (0 20px 25px) -> WE WANT THIS ONE
        */
        .shadow-multi {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 20px 25px -5px rgba(0, 0, 0, 0.04);
        }

        /*
           Case 2: Single giant shadow.
           Should be picked easily.
        */
        .shadow-single {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /*
           Case 3: Inset shadow (should be ignored) + Outer shadow
        */
        .shadow-inset {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06), 0 15px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="card shadow-multi">
        <p>Multi Shadow (Want Big)</p>
    </div>
    <div class="card shadow-single">
        <p>Single Shadow</p>
    </div>
    <div class="card shadow-inset">
        <p>Inset + Outer (Want Outer)</p>
    </div>
</body>

</html>
