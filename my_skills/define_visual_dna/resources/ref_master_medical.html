<div class="slide-master">
    <!-- Clean White Background -->
    <div class="bg-layer" style="
        position: absolute; 
        top: 0; left: 0; width: 100%; height: 100%; 
        background: #FFFFFF; 
        z-index: 0;
    "></div>

    <!-- Medical Accent Header -->
    <div class="header-accent" style="
        position: absolute; 
        top: 0; left: 0; width: 100%; height: 10px; 
        background: linear-gradient(90deg, var(--ppt-color-accent-1), var(--ppt-color-accent-2));
    "></div>

    <!-- Persistent Footer -->
    <div class="footer-bar" style="
        position: absolute; 
        bottom: 30px; 
        left: 50px; 
        right: 50px; 
        height: 1px; 
        background: #E2E8F0;
    "></div>

    <div class="logo-area" style="position: absolute; bottom: 40px; right: 50px; display:flex; align-items:center;">
        <span style="
            font-family: var(--ppt-font-heading); 
            color: var(--ppt-color-accent-1); 
            font-weight: bold; 
            margin-right: 5px;
        ">+</span>
        <span style="
            font-family: var(--ppt-font-heading); 
            font-size: 14px; 
            color: var(--ppt-color-text-secondary);
        ">MEDICARE</span>
    </div>

    <!-- Slide Number -->
    <div class="slide-num" data-pptx-placeholder="slide_number" style="
        position: absolute; 
        bottom: 40px; 
        left: 50px; 
        font-family: var(--ppt-font-body); 
        color: var(--ppt-color-text-secondary);
        font-size: 14px;
    ">
        #
    </div>
</div>
